services:
  client:
    build: ./client
    ports:
      - "5173:5173"
    depends_on:
      - server
    restart: always

  server:
    build: ./server
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads
      - ./photos.db:/app/photos.db
    env_file:
      - .env
    restart: always

volumes:
  uploads:
  db:
